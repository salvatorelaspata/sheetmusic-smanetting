name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Permessi necessari al deploy su Pages tramite Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy alla volta.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test
        run: npm run test

      # Il base path deve corrispondere al nome del repository
      # (https://<utente>.github.io/<repo>/). Lo ricaviamo dinamicamente.
      - name: Build
        run: npm run build -- --base="/${{ github.event.repository.name }}/"

      # GitHub Pages non fa rewrite SPA: 404.html = copia di index.html così i
      # link diretti e i refresh funzionano (il router carica la rotta giusta).
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
